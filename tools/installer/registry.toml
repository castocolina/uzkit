# ═══════════════════════════════════════════ AI toolkits ═══════════════════════
[[tool]]
id = "superpowers"
name = "Superpowers"
kind = "marketplace"
category = "ai"
priority = "P1"
marketplace = "superpowers-marketplace"
marketplace_ref = "obra/superpowers"
plugins = ["superpowers", "superpowers-chrome", "superpowers-developing-for-claude-code"]

[[tool]]
id = "agent-toolkit"
name = "Softaworks agent-toolkit"
kind = "marketplace"
category = "ai"
priority = "P1"
marketplace = "agent-toolkit"
marketplace_ref = "softaworks/agent-toolkit"

[[tool]]
id = "gsd"
name = "GSD Core"
kind = "launcher"
category = "ai"
priority = "P1"
cmd = "npx"
wiring = "npx @opengsd/gsd-core@latest"
update = "npx @opengsd/gsd-core@latest"
interactive = true
verify = "/gsd-new-project"
notes = "Interactive npx installer; wires Claude Code. Repo: open-gsd/gsd-core"

[[tool]]
id = "gentle-ai"
name = "Gentle-AI"
kind = "launcher"
category = "ai"
priority = "P1"
cmd = "gentle-ai"
bootstrap_brew = "brew tap Gentleman-Programming/homebrew-tap && brew install gentle-ai"
bootstrap_curl = "curl -fsSL https://raw.githubusercontent.com/Gentleman-Programming/gentle-ai/main/scripts/install.sh | bash"
wiring = "gentle-ai install --agent claude-code,opencode --scope global"
update = "gentle-ai update"
interactive = true
wired_marker = "~/.gentle-ai/state.json"
verify = "gentle-ai doctor"
notes = "Configurator: binary via brew/curl/go, then `install` (TUI). Update = `gentle-ai update`."
