# uz-kit installer registry — the single declarative source of truth.
#
# One array of tables: [[tool]]. Each row declares a `kind`; a generic strategy
# per kind performs the install (see installer/strategies.py). The irregular long
# tail lives behind kind="custom" + fn="install_<name>" (installer/custom.py).
# Loaded by installer/model.py via stdlib tomllib (python >= 3.11, no deps).
#
# Common fields: id (unique), name, kind, category, priority, cmd (defaults to id),
#   requires=[ids] (installed first AND dragged in if missing), bin_dir (PATH-managed),
#   setup (one-time post-install shell command), notes.
# Per-kind:
#   pkg            pkg.{debian,arch,brew}, alias_cmd (debian)
#   cargo          crate, pkg.{arch,brew} fallback
#   node           npm_pkg  (installed via volta/pnpm — never bare npm)
#   curl           url, shell (sh|bash), brew (macOS override), bin_dir
#   github-release repo, asset (templated {ver}{os}{arch.deb|go|suffix|machine}), member, raw
#   marketplace    marketplace, marketplace_ref, plugins[]
#   launcher       bootstrap_curl/bootstrap_brew, wiring, update, verify, wired_marker, interactive
#   custom         fn
# Optional [tool.version] block: latest="github:owner/repo|crates:name|json:URL#key",
#   installed_cmd, installed_re — powers the `sync` outdated check.

# ─────────────────────────────────────────── P0: search & data
[[tool]]
id = "rg"
name = "ripgrep"
kind = "pkg"
category = "search"
priority = "P0"
pkg = { debian = "ripgrep", arch = "ripgrep", brew = "ripgrep" }

[[tool]]
id = "fd"
name = "fd"
kind = "pkg"
category = "search"
priority = "P0"
pkg = { debian = "fd-find", arch = "fd", brew = "fd" }
alias_cmd = "fdfind"
notes = "Debian binary: fdfind"

[[tool]]
id = "jq"
name = "jq"
kind = "pkg"
category = "data"
priority = "P0"
pkg = { debian = "jq", arch = "jq", brew = "jq" }

[[tool]]
id = "yq"
name = "yq"
kind = "github-release"
category = "data"
priority = "P0"
repo = "mikefarah/yq"
asset = "yq_linux_{arch.deb}"
raw = true
bin_dir = "~/.local/bin"
notes = "Binary from GitHub"
[tool.version]
latest = "github:mikefarah/yq"
installed_cmd = "yq --version"
installed_re = "v([0-9.]+)"

[[tool]]
id = "gh"
name = "GitHub CLI"
kind = "custom"
fn = "install_gh"
category = "git"
priority = "P0"
notes = "GitHub CLI (apt repo / pacman / brew)"

# ─────────────────────────────────────────── P0: package managers / toolchains
[[tool]]
id = "uv"
name = "uv"
kind = "curl"
category = "pkg-mgr"
priority = "P0"
url = "https://astral.sh/uv/install.sh"
shell = "sh"
bin_dir = "~/.local/bin"
notes = "Python package manager"

[[tool]]
id = "volta"
name = "volta"
kind = "curl"
category = "pkg-mgr"
priority = "P0"
url = "https://get.volta.sh"
shell = "bash"
bin_dir = "~/.volta/bin"
notes = "Node.js toolchain"

[[tool]]
id = "pnpm"
name = "pnpm"
kind = "custom"
fn = "install_pnpm"
category = "pkg-mgr"
priority = "P0"
requires = ["volta"]
setup = "pnpm self-update && pnpm setup"
notes = "Via volta; setup configures PNPM_HOME + global bin dir"

[[tool]]
id = "node"
name = "Node.js 22 LTS"
kind = "custom"
fn = "install_node"
category = "pkg-mgr"
priority = "P0"
requires = ["volta"]
notes = "Node 22 LTS via volta (volta install node@22)"

# ─────────────────────────────────────────── P0: workflow
[[tool]]
id = "mmdc"
name = "mermaid CLI"
kind = "node"
category = "workflow"
priority = "P0"
npm_pkg = "@mermaid-js/mermaid-cli"
requires = ["volta"]
notes = "Diagram generation"

# ─────────────────────────────────────────── P1: navigation & exploration
[[tool]]
id = "eza"
name = "eza"
kind = "github-release"
category = "nav"
priority = "P1"
repo = "eza-community/eza"
asset = "eza_{arch.machine}-unknown-linux-musl.tar.gz"
member = "eza"
pkg = { arch = "eza", brew = "eza" }
bin_dir = "~/.local/bin"
notes = "Binary from GitHub (apt/musl); pacman/brew on arch/mac"
[tool.version]
latest = "github:eza-community/eza"
installed_cmd = "eza --version"
installed_re = "v([0-9.]+)"

[[tool]]
id = "tmux"
name = "tmux"
kind = "pkg"
category = "system"
priority = "P1"
pkg = { debian = "tmux", arch = "tmux", brew = "tmux" }

[[tool]]
id = "tokei"
name = "tokei"
kind = "cargo"
category = "search"
priority = "P1"
crate = "tokei"
pkg = { arch = "tokei", brew = "tokei" }

[[tool]]
id = "ast-grep"
cmd = "sg"
name = "ast-grep"
kind = "cargo"
category = "search"
priority = "P1"
crate = "ast-grep"
pkg = { arch = "ast-grep", brew = "ast-grep" }

[[tool]]
id = "codegraph"
name = "CodeGraph"
